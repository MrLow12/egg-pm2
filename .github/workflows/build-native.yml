name: Build & Push Native Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'native/**'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: "ubuntu:26.04"
            tag: "ubuntu26"
          - base_image: "ubuntu:24.04"
            tag: "ubuntu24"
          - base_image: "ubuntu:22.04"
            tag: "ubuntu22"
          - base_image: "debian:12-slim"
            tag: "debian12"
          - base_image: "debian:11-slim"
            tag: "debian11"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up metadata
        id: meta
        run: |
          echo "version=3.5.0" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "owner_lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./native
          file: ./native/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.owner_lowercase }}/egg-pm2:${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_REVISION=${{ steps.meta.outputs.revision }}
            IMAGE_CREATED=${{ steps.meta.outputs.created }}
